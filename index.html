<!DOCTYPE html>
<html>
<head>
  <title>Music Hub</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="text-align:center; font-family:sans-serif;">

<h1>🎵 Music Hub</h1>

<button onclick="loginWithPi()">Login with Pi</button>

<br><br>

<input type="file" id="fileInput"><br><br>
<audio id="player" controls></audio><br><br>

<button onclick="like()">❤️ Like</button>
<p id="likes">Likes: 0</p>

<script>
  Pi.init({ version: "2.0", sandbox: true });

  async function loginWithPi() {
    try {
      const scopes = ['username'];

      const auth = await Pi.authenticate(scopes, function(payment) {
        console.log(payment);
      });

      alert("Welcome " + auth.user.username);

    } catch (e) {
      console.log(e);
      alert("Login failed");
    }
  }

  // music upload preview
  document.getElementById("fileInput").addEventListener("change", function(e){
    const file = e.target.files[0];
    const url = URL.createObjectURL(file);
    document.getElementById("player").src = url;
  });

  let count = 0;
  function like(){
    count++;
    document.getElementById("likes").innerText = "Likes: " + count;
  }
</script>

</body>
</html>
