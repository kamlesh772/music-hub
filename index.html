<!DOCTYPE html>
<html>
<head>
  <title>Music Hub</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="text-align:center; font-family:sans-serif;">

  <h1>🎵 Music Hub</h1>

  <button onclick="login()">Login with Pi</button>
  <h3 id="user"></h3>

  <br><br>

  <h3>Upload your song:</h3>
  <input type="file" id="fileInput" accept="audio/*">

  <br><br>

  <audio id="player" controls></audio>

  <br><br>

  <button onclick="like()">❤️ Like</button>
  <p id="likes">Likes: 0</p>

  <script>
    let currentUser = "";
    let likes = 0;

    // Pi Init
    Pi.init({ version: "2.0" });

    async function login() {
      try {
        const scopes = ['username', 'payments'];
        const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);

        currentUser = auth.user.username;
        document.getElementById("user").innerText = "Welcome " + currentUser;

      } catch (err) {
        alert("Login failed");
      }
    }

    function onIncompletePaymentFound(payment) {
      console.log("Incomplete payment", payment);
    }

    // Upload + Play
    document.getElementById("fileInput").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        document.getElementById("player").src = url;
      }
    });

    // Like system
    function like() {
      likes++;
      document.getElementById("likes").innerText = "Likes: " + likes;
    }
  </script>

</body>
</html>
